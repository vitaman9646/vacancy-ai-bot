version: '3.8'

services:
  vacancy-bot:
    build: .
    container_name: vacancy-ai-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./vacancies.db:/app/vacancies.db
      - ./logs:/app/logs
      - ./workflows:/app/workflows
    depends_on:
      - n8n
    networks:
      - vacancy-network

  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=admin
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-changeme}
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - vacancy-network

volumes:
  n8n_data:

networks:
  vacancy-network:
    driver: bridge
